server:
  port: 8080

spring:
  application:
    name: task-manage-system

  # MySQL Database Configuration
  # 请先执行 src/main/resources/db/schema-mysql.sql 和 data-mysql.sql 初始化数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/task_manage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: chengyuhan2136

# MyBatis-Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc / Knife4j
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    enable-security: true

# RSS News Configuration
news:
  rss-url: https://www.oschina.net/news/rss

